<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mono's Barbería Holguín - Reservas</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-green: #1a3625; /* Verde bosque */
            --gold: #cbb26a; /* Dorado */
            --gold-hover: #e0cca0;
        }

        body {
            background-color: var(--bg-green);
            color: var(--gold);
            font-family: 'Playfair Display', serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
            border: 2px solid var(--gold);
            padding: 30px;
            border-radius: 8px;
            box-sizing: border-box;
            background-image: linear-gradient(rgba(26, 54, 37, 0.95), rgba(26, 54, 37, 0.95));
        }

        .logo-title {
            text-align: center;
            font-size: 3em;
            margin: 0;
            font-weight: normal;
        }

        .subtitle {
            text-align: center;
            font-style: italic;
            font-size: 1.2em;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .address {
            text-align: center;
            font-size: 0.9em;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--gold);
            padding-bottom: 15px;
        }

        h3 {
            font-weight: normal;
            border-bottom: 1px dashed var(--gold);
            padding-bottom: 5px;
        }

        .service-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
        }

        .service-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2em;
            cursor: pointer;
        }

        .service-item input[type="checkbox"] {
            accent-color: var(--gold);
            width: 20px;
            height: 20px;
            margin-right: 15px;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        input[type="date"], select {
            background-color: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 10px;
            font-family: 'Playfair Display', serif;
            font-size: 1em;
            border-radius: 4px;
            outline: none;
        }

        /* Cambiar color del icono del calendario */
        ::-webkit-calendar-picker-indicator {
            filter: invert(79%) sepia(21%) saturate(677%) hue-rotate(352deg) brightness(96%) contrast(89%);
            cursor: pointer;
        }

        .btn-submit {
            background-color: var(--gold);
            color: var(--bg-green);
            border: none;
            padding: 15px;
            width: 100%;
            font-size: 1.2em;
            font-weight: bold;
            font-family: 'Playfair Display', serif;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 20px;
            transition: background-color 0.3s;
        }

        .btn-submit:hover {
            background-color: var(--gold-hover);
        }

        /* Botón flotante de WhatsApp */
        .whatsapp-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #25D366;
            color: white;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            font-family: sans-serif;
            font-size: 30px;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="logo-title">Mono's</h1>
        <div class="subtitle">Barberia</div>
        <div class="address">
            Maceo 254 e/ Cables y Ángel Guerra<br>
            Holguín,Cuba
        </div>

        <form id="bookingForm">
            <h3>1. Elige tus servicios</h3>
            <div class="service-list" id="services">
                <label class="service-item">
                    <div><input type="checkbox" name="service" value="Corte sencillo" data-price="200"> Corte sencillo</div>
                    <span>$200</span>
                </label>
                <label class="service-item">
                    <div><input type="checkbox" name="service" value="Degradado" data-price="400"> Degradado</div>
                    <span>$400</span>
                </label>
                <label class="service-item">
                    <div><input type="checkbox" name="service" value="Barba" data-price="100"> Barba</div>
                    <span>$100</span>
                </label>
                <label class="service-item">
                    <div><input type="checkbox" name="service" value="Diseño" data-price="100"> Diseño</div>
                    <span>$100</span>
                </label>
                <label class="service-item">
                    <div><input type="checkbox" name="service" value="Peinado" data-price="200"> Peinado</div>
                    <span>$200</span>
                </label>
            </div>

            <h3>2. Elige fecha y hora</h3>
            <div class="form-group">
                <label for="date">Fecha:</label>
                <input type="date" id="date" required>
            </div>

            <div class="form-group">
                <label for="time">Hora:</label>
                <select id="time" required disabled>
                    <option value="">Selecciona una fecha primero...</option>
                </select>
            </div>

            <button type="button" class="btn-submit" onclick="sendToWhatsApp()">Reservar por WhatsApp</button>
        </form>
    </div>

    <a href="https://wa.me/5358592776?text=Hola%20Félix,%20tengo%20una%20consulta%20sobre%20la%20barbería" class="whatsapp-float" target="_blank">
        💬
    </a>

    <script>
        const dateInput = document.getElementById('date');
        const timeSelect = document.getElementById('time');
        const checkboxes = document.querySelectorAll('input[name="service"]');

        // Configurar la fecha mínima como hoy
        const today = new Date().toISOString().split('T')[0];
        dateInput.setAttribute('min', today);

        // Actualizar horarios disponibles cuando cambia la fecha o los servicios
        function updateAvailableTimes() {
            const selectedDate = new Date(dateInput.value + 'T00:00:00');
            const dayOfWeek = selectedDate.getDay(); // 0=Dom, 1=Lun... 6=Sab

            timeSelect.innerHTML = '';

            // Verificar si es domingo (0)
            if (dayOfWeek === 0) {
                timeSelect.innerHTML = '<option value="">Cerrado los domingos</option>';
                timeSelect.disabled = true;
                return;
            }

            // Calcular duración requerida
            let selectedCount = 0;
            checkboxes.forEach(cb => { if (cb.checked) selectedCount++; });
            
            if (selectedCount === 0) {
                timeSelect.innerHTML = '<option value="">Selecciona un servicio primero</option>';
                timeSelect.disabled = true;
                return;
            }

            timeSelect.disabled = false;
            const requiresOneHour = selectedCount >= 2;

            // Horarios base
            const slots = [
                "09:00 AM", "09:30 AM", "10:00 AM", "10:30 AM", "11:00 AM", "11:30 AM",
                "02:00 PM", "02:30 PM", "03:00 PM", "03:30 PM", "04:00 PM", "04:30 PM"
            ];

            timeSelect.innerHTML = '<option value="">Elige una hora...</option>';

            slots.forEach(slot => {
                // Si requiere 1 hora, no puede reservar en los últimos turnos antes de cerrar o almorzar
                if (requiresOneHour && (slot === "11:30 AM" || slot === "04:30 PM")) {
                    return; // Saltar este horario
                }
                const option = document.createElement('option');
                option.value = slot;
                option.textContent = slot;
                timeSelect.appendChild(option);
            });
        }

        dateInput.addEventListener('change', updateAvailableTimes);
        checkboxes.forEach(cb => cb.addEventListener('change', updateAvailableTimes));

        function sendToWhatsApp() {
            const date = dateInput.value;
            const time = timeSelect.value;
            
            let selectedServices = [];
            let totalPrice = 0;

            checkboxes.forEach(cb => {
                if (cb.checked) {
                    selectedServices.push(cb.value);
                    totalPrice += parseInt(cb.getAttribute('data-price'));
                }
            });

            if (selectedServices.length === 0) {
                alert("Por favor, selecciona al menos un servicio.");
                return;
            }
            if (!date || !time) {
                alert("Por favor, selecciona una fecha y una hora válida.");
                return;
            }

            // Formatear la fecha para que se lea mejor (DD/MM/YYYY)
            const dateObj = new Date(date + 'T00:00:00');
            const formattedDate = dateObj.toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

            const message = `¡Hola Félix! Quiero agendar una cita en Mono's Barbería.%0A%0A` +
                            `📅 *Fecha:* ${formattedDate}%0A` +
                            `⏰ *Hora:* ${time}%0A` +
                            `✂️ *Servicios:* ${selectedServices.join(', ')}%0A` +
                            `💵 *Total aprox:* $${totalPrice}`;

            const whatsappUrl = `https://wa.me/5358592776?text=${message}`;
            window.open(whatsappUrl, '_blank');
        }
    </script>
</body>
</html>
