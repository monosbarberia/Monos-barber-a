<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mono's Barbería Holguín - Reservas</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-forest-green: #193323;
            --elegant-gold: #cbb26a; 
            --elegant-gold-hover: #e0cca0;
        }

        body {
            background-color: var(--dark-forest-green);
            color: var(--elegant-gold);
            font-family: 'Cormorant Garamond', serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
            border: 2px solid var(--elegant-gold);
            padding: 40px 30px;
            border-radius: 12px;
            box-sizing: border-box;
            background-color: var(--dark-forest-green);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 10px;
        }

        .logo-img {
            max-width: 250px;
            width: 100%;
            height: auto;
        }

        .info-header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--elegant-gold);
            padding-bottom: 20px;
        }

        .subtitle {
            font-style: italic;
            font-size: 1.3em;
            margin: 5px 0;
            opacity: 0.9;
        }

        .address {
            font-size: 1.1em;
            margin: 10px 0;
            letter-spacing: 1px;
            line-height: 1.4;
        }

        .section-title {
            font-size: 1.5em;
            margin-top: 30px;
            border-bottom: 1px dashed rgba(203, 178, 106, 0.5);
            padding-bottom: 5px;
            margin-bottom: 20px;
        }

        .service-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .service-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2em;
            padding: 15px 20px;
            border: 1px solid rgba(203, 178, 106, 0.4);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
        }

        .service-item input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            height: 0;
            width: 0;
        }

        .service-item.selected {
            background-color: var(--elegant-gold);
            color: var(--dark-forest-green);
            font-weight: bold;
            transform: scale(1.02);
        }

        .form-group {
            margin: 25px 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        input[type="date"], select {
            background-color: transparent;
            color: var(--elegant-gold);
            border: 1px solid var(--elegant-gold);
            padding: 15px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1em;
            border-radius: 6px;
            outline: none;
            appearance: none;
        }

        .live-summary {
            background-color: rgba(0,0,0,0.2);
            padding: 15px 20px;
            border-radius: 8px;
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2em;
            border-left: 3px solid var(--elegant-gold);
        }

        .summary-label {
            font-style: italic;
            opacity: 0.8;
            font-size: 0.9em;
        }

        .summary-value {
            font-weight: bold;
            font-size: 1.3em;
        }

        .btn-submit {
            background-color: var(--elegant-gold);
            color: var(--dark-forest-green);
            border: none;
            padding: 18px;
            width: 100%;
            font-size: 1.3em;
            font-weight: bold;
            font-family: 'Cormorant Garamond', serif;
            cursor: pointer;
            border-radius: 6px;
            margin-top: 25px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-submit:disabled {
            background-color: rgba(203, 178, 106, 0.2);
            color: rgba(203, 178, 106, 0.5);
            cursor: not-allowed;
        }

        .whatsapp-float {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background-color: #25D366;
            color: white;
            border-radius: 50%;
            width: 65px;
            height: 65px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 35px;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <img src="logo.jpg" alt="Logo Mono's" class="logo-img">
        </div>

        <div class="info-header">
            <div class="subtitle">Luce limpio, fino, mono...</div>
            <div class="address">Maceo 254 e/ Cables y Ángel Guerra<br>Holguín, Cuba</div>
        </div>

        <form id="bookingForm">
            <h3 class="section-title">Servicios</h3>
            <div class="service-list">
                <label class="service-item">
                    <span><input type="checkbox" name="service" value="Corte sencillo" data-price="200" class="main-cut"> Corte sencillo</span>
                    <span>$200</span>
                </label>
                <label class="service-item">
                    <span><input type="checkbox" name="service" value="Degradado" data-price="400" class="main-cut"> Degradado</span>
                    <span>$400</span>
                </label>
                <label class="service-item">
                    <span><input type="checkbox" name="service" value="Barba" data-price="100" class="addon"> Barba</span>
                    <span>$100</span>
                </label>
                <label class="service-item">
                    <span><input type="checkbox" name="service" value="Diseño" data-price="100" class="addon"> Diseño</span>
                    <span>$100</span>
                </label>
                <label class="service-item">
                    <span><input type="checkbox" name="service" value="Peinado" data-price="200" class="addon"> Peinado</span>
                    <span>$200</span>
                </label>
            </div>

            <h3 class="section-title">Cita</h3>
            <div class="form-group">
                <label>Fecha:</label>
                <input type="date" id="date" required>
            </div>

            <div class="form-group">
                <label>Hora:</label>
                <select id="time" required disabled>
                    <option value="">Selecciona fecha primero...</option>
                </select>
            </div>

            <div class="live-summary">
                <div>
                    <div class="summary-label">Tiempo est.</div>
                    <div id="live-duration">--</div>
                </div>
                <div style="text-align: right;">
                    <div class="summary-label">Total</div>
                    <div class="summary-value" id="live-total">$0</div>
                </div>
            </div>

            <button type="button" class="btn-submit" id="submitBtn" onclick="sendToWhatsApp()" disabled>Confirmar Reserva</button>
        </form>
    </div>

    <a href="https://wa.me/5358592776" class="whatsapp-float" target="_blank">💬</a>

    <script>

        const liveTotal = document.getElementById('live-total');

                    selectedCount++;

                    if (cb.classList.contains('addon')) addonsCount++;

                    parentLabel.classList.remove('selected');
                }
