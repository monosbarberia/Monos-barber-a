<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mono's Barbería Holguín - Reservas</title>

<style>
:root {
    --dark-forest-green: #1c3823;
    --elegant-gold: #cbb26a;
}

body {
    background-color: var(--dark-forest-green);
    color: var(--elegant-gold);
    font-family: 'Cormorant Garamond', serif;
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
}

.container {
    max-width: 500px;
    width: 100%;
    border: 2px solid var(--elegant-gold);
    padding: 30px;
    border-radius: 12px;
}

.time-slots {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 15px;
}

.slot {
    padding: 12px;
    text-align: center;
    border: 1px solid var(--elegant-gold);
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
}

.slot:hover {
    background: var(--elegant-gold);
    color: var(--dark-forest-green);
}

.slot.selected {
    background: var(--elegant-gold);
    color: var(--dark-forest-green);
    font-weight: bold;
}

.slot.occupied {
    background: rgba(255,0,0,0.2);
    color: red;
    border: 1px solid red;
    cursor: not-allowed;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: transparent;
    border: 1px solid var(--elegant-gold);
    color: var(--elegant-gold);
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 25px;
    background: var(--elegant-gold);
    border: none;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>Reserva tu turno</h2>

<input type="date" id="date">

<div id="slots" class="time-slots"></div>

<button onclick="enviarReserva()">Confirmar Reserva</button>

</div>

<script>

const allSlots = [
"09:00 AM","09:30 AM","10:00 AM","10:30 AM","11:00 AM","11:30 AM",
"02:00 PM","02:30 PM","03:00 PM","03:30 PM","04:00 PM","04:30 PM","05:00 PM"
];

let reservas = {};
let selectedTime = "";

async function cargarReservas() {
    const res = await fetch('reservas.json');
    reservas = await res.json();
}

async function renderSlots() {

    await cargarReservas();

    const date = document.getElementById("date").value;
    const container = document.getElementById("slots");

    container.innerHTML = "";
    selectedTime = "";

    if (!date) return;

    const ocupados = reservas[date] || [];

    allSlots.forEach(slot => {
        const div = document.createElement("div");
        div.textContent = slot;

        if (ocupados.includes(slot)) {
            div.classList.add("slot","occupied");
        } else {
            div.classList.add("slot");

            div.onclick = () => {
                document.querySelectorAll(".slot").forEach(s => s.classList.remove("selected"));
                div.classList.add("selected");
                selectedTime = slot;
            };
        }

        container.appendChild(div);
    });
}

document.getElementById("date").addEventListener("change", renderSlots);

function enviarReserva() {

    const fecha = document.getElementById("date").value;

    if (!fecha || !selectedTime) {
        alert("Selecciona fecha y hora");
        return;
    }

    const msg = `¡Hola Félix!%0A%0AQuiero una cita en Mono's Barbería%0A📅 ${fecha} ${selectedTime}`;

    window.open(`https://wa.me/5358592776?text=${msg}`, '_blank');
}

</script>

</body>
</html>
