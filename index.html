<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mono's Barbería Holguín - Reservas</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-forest-green: #1c3823;
            --elegant-gold: #cbb26a; 
            --elegant-gold-hover: #e0cca0;
        }

        body {
            background-color: var(--dark-forest-green);
            color: var(--elegant-gold);
            font-family: 'Cormorant Garamond', serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
            border: 2px solid var(--elegant-gold);
            padding: 40px 30px;
            border-radius: 12px;
            box-sizing: border-box;
            background-color: var(--dark-forest-green);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 10px;
        }

        .logo-img {
            max-width: 250px;
            width: 100%;
            height: auto;
        }

        .info-header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--elegant-gold);
            padding-bottom: 20px;
        }

        .subtitle {
            font-style: italic;
            font-size: 1.3em;
            margin: 5px 0;
            opacity: 0.9;
        }

        .address {
            font-size: 1.1em;
            margin: 10px 0;
            letter-spacing: 1px;
            line-height: 1.4;
        }

        .section-title {
            font-size: 1.5em;
            margin-top: 30px;
            border-bottom: 1px dashed rgba(203, 178, 106, 0.5);
            padding-bottom: 5px;
            margin-bottom: 20px;
        }

        .service-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .service-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2em;
            padding: 15px 20px;
            border: 1px solid rgba(203, 178, 106, 0.4);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .service-item input[type="checkbox"] {
            position: absolute;
            opacity: 0;
        }

        .service-item.selected {
            background-color: var(--elegant-gold);
            color: var(--dark-forest-green);
            font-weight: bold;
            transform: scale(1.02);
        }

        .form-group {
            margin: 25px 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        input[type="date"], select {
            background-color: transparent;
            color: var(--elegant-gold);
            border: 1px solid var(--elegant-gold);
            padding: 15px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1em;
            border-radius: 6px;
            outline: none;
        }

        .live-summary {
            background-color: rgba(0,0,0,0.2);
            padding: 15px 20px;
            border-radius: 8px;
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2em;
            border-left: 3px solid var(--elegant-gold);
        }

        .summary-label {
            font-style: italic;
            opacity: 0.8;
            font-size: 0.9em;
        }

        .summary-value {
            font-weight: bold;
            font-size: 1.3em;
        }

        .btn-submit {
            background-color: var(--elegant-gold);
            color: var(--dark-forest-green);
            border: none;
            padding: 18px;
            width: 100%;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            margin-top: 25px;
        }

        .btn-submit:disabled {
            background-color: rgba(203, 178, 106, 0.2);
            color: rgba(203, 178, 106, 0.5);
        }

        .whatsapp-float {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background-color: #25D366;
            color: white;
            border-radius: 50%;
            width: 65px;
            height: 65px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 35px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="logo-container">
        <img src="logo.jpg" class="logo-img">
    </div>

    <div class="info-header">
        <div class="subtitle">Luce limpio, fino, mono...</div>
        <div class="address">Maceo 254 e/ Cables y Ángel Guerra<br>Holguín, Cuba</div>
    </div>

    <form id="bookingForm">

        <h3 class="section-title">Servicios</h3>

        <div class="service-list">
            <label class="service-item">
                <input type="checkbox" value="Corte sencillo" data-price="200" class="main-cut">
                <span>Corte sencillo</span><span>$200</span>
            </label>

            <label class="service-item">
                <input type="checkbox" value="Degradado" data-price="400" class="main-cut">
                <span>Degradado</span><span>$400</span>
            </label>

            <label class="service-item">
                <input type="checkbox" value="Barba" data-price="100" class="addon">
                <span>Barba</span><span>$100</span>
            </label>

            <label class="service-item">
                <input type="checkbox" value="Diseño" data-price="100" class="addon">
                <span>Diseño</span><span>$100</span>
            </label>

            <label class="service-item">
                <input type="checkbox" value="Peinado" data-price="200" class="addon">
                <span>Peinado</span><span>$200</span>
            </label>
        </div>

        <h3 class="section-title">Cita</h3>

        <div class="form-group">
            <label>Fecha:</label>
            <input type="date" id="date" required>
        </div>

        <div class="form-group">
            <label>Turno:</label>
            <select id="time" required disabled>
                <option value="">Selecciona fecha primero...</option>
                <option value="Mañana">Mañana</option>
                <option value="Tarde">Tarde</option>
            </select>
        </div>

        <div class="live-summary">
            <div>
                <div class="summary-label">Tiempo est.</div>
                <div id="live-duration">--</div>
            </div>
            <div>
                <div class="summary-label">Total</div>
                <div class="summary-value" id="live-total">$0</div>
            </div>
        </div>

        <button type="button" id="submitBtn" class="btn-submit" onclick="sendToWhatsApp()" disabled>
            Confirmar Reserva
        </button>

    </form>

</div>

<a href="https://wa.me/5358592776" class="whatsapp-float">💬</a>

<script>
const dateInput = document.getElementById('date');
const timeSelect = document.getElementById('time');
const checkboxes = document.querySelectorAll('input[type="checkbox"]');
const submitBtn = document.getElementById('submitBtn');
const liveTotal = document.getElementById('live-total');
const liveDuration = document.getElementById('live-duration');

dateInput.min = new Date().toISOString().split('T')[0];

function updateFormState(e) {

    if (e && e.target.classList.contains('main-cut') && e.target.checked) {
        checkboxes.forEach(cb => {
            if (cb.classList.contains('main-cut') && cb !== e.target) cb.checked = false;
        });
    }

    let total = 0;
    let count = 0;

    checkboxes.forEach(cb => {
        const label = cb.closest('.service-item');
        if (cb.checked) {
            total += parseInt(cb.dataset.price);
            count++;
            label.classList.add('selected');
        } else {
            label.classList.remove('selected');
        }
    });

    liveTotal.textContent = `$${total}`;
    liveDuration.textContent = count > 1 ? "1 hora aprox." : "30 minutos";

    if (dateInput.value) {
        const d = new Date(dateInput.value + 'T00:00:00');

        if (d.getDay() === 0) {
            timeSelect.innerHTML = '<option>Cerrado Domingos</option>';
            timeSelect.disabled = true;
        } else {
            timeSelect.disabled = false;
        }
    }

    submitBtn.disabled = !(count > 0 && dateInput.value && timeSelect.value);
}

checkboxes.forEach(cb => cb.addEventListener('change', updateFormState));
dateInput.addEventListener('change', updateFormState);
timeSelect.addEventListener('change', updateFormState);

function sendToWhatsApp() {

    let servicios = [];
    let total = 0;

    checkboxes.forEach(cb => {
        if (cb.checked) {
            servicios.push(cb.value);
            total += parseInt(cb.dataset.price);
        }
    });

    const msg = `Hola Félix!%0A%0AQuiero una cita en Mono's Barbería%0A📅 ${dateInput.value} (${timeSelect.value})%0A✂️ ${servicios.join(', ')}%0A💰 Total: $${total}`;

    window.open(`https://wa.me/5358592776?text=${msg}`);
}
</script>

</body>
</html>
