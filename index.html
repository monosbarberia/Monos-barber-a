<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mono's Barbería | Cortes Clásicos y Reserva Online</title>

<meta name="description" content="Especialistas en cortes de caballero y degradados en Holguín. Reserva fácil y rápido.">
<meta name="author" content="Félix">

<link rel="icon" href="favicon.jpg">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&display=swap" rel="stylesheet">

<style>
:root {
    --green: #1c3823;
    --gold: #cbb26a;
}

body {
    background-color: var(--green);
    color: var(--gold);
    font-family: 'Cormorant Garamond', serif;
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
}

.container {
    max-width: 500px;
    width: 100%;
    border: 2px solid var(--gold);
    padding: 30px;
    border-radius: 10px;
}

.logo-container {
    text-align: center;
}

.logo-img {
    width: 100%;
    max-width: 300px;
}

.subtitle {
    text-align: center;
    font-style: italic;
}

.address {
    text-align: center;
    margin: 10px 0;
}

.section-title {
    text-align: center;
    margin-top: 30px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 5px;
}

.gallery {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.gallery img {
    width: 100%;
    border-radius: 8px;
    border: 1px solid var(--gold);
}

/* Servicios */
.service-item {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    border: 1px solid var(--gold);
    margin-top: 10px;
    cursor: pointer;
}

/* Botón */
.btn-submit {
    width: 100%;
    padding: 15px;
    background: var(--gold);
    color: var(--green);
    border: none;
    margin-top: 20px;
    font-size: 18px;
    cursor: pointer;
}

/* WhatsApp */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 30px;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="container">

<div class="logo-container">
<img src="logo.png" class="logo-img">
</div>

<p class="subtitle">Luce limpio, fino, mono...</p>
<p class="address">Holguín, Cuba</p>

<!-- GALERÍA -->
<h3 class="section-title">Trabajos realizados</h3>

<div class="gallery">
    <img src="corte1.jpg">
    <img src="corte2.jpg">
</div>

<!-- SERVICIOS -->
<h3 class="section-title">Servicios</h3>

<div class="service-item">
<span>Corte sencillo</span>
<span>$200</span>
</div>

<div class="service-item">
<span>Degradado</span>
<span>$400</span>
</div>

<div class="service-item">
<span>Barba</span>
<span>$100</span>
</div>

<button class="btn-submit" onclick="reservar()">Reservar por WhatsApp</button>

</div>

<a href="https://wa.me/5358592776" class="whatsapp">💬</a>

<script>
function reservar() {
    let msg = "Hola Félix, quiero reservar una cita en Mono's Barbería";
    window.open("https://wa.me/5358592776?text=" + encodeURIComponent(msg));
}
</script>

</body>
</html>
