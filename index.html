<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mono's Barbería Holguin - Reservas</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-forest-green: #193323;
            --elegant-gold: #cbb26a; 
            --elegant-gold-hover: #e0cca0;
        }

        body {
            background-color: var(--dark-forest-green);
            color: var(--elegant-gold);
            font-family: 'Cormorant Garamond', serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 500px;
            width: 100%;
            border: 2px solid var(--elegant-gold);
            padding: 30px;
            border-radius: 8px;
            box-sizing: border-box;
            background-color: var(--dark-forest-green);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 10px;
        }

        .logo-img {
            max-width: 250px;
            width: 100%;
            height: auto;
        }

        .info-header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--elegant-gold);
            padding-bottom: 15px;
        }

        .subtitle {
            font-style: italic;
            font-size: 1.3em;
            margin: 5px 0;
        }

        .address {
            font-size: 1.1em;
            margin: 10px 0;
            letter-spacing: 1px;
        }

        .section-title {
            font-size: 1.5em;
            margin-top: 30px;
            border-bottom: 1px dashed var(--elegant-gold);
            padding-bottom: 5px;
            margin-bottom: 15px;
        }

        .service-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .service-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2em;
        }

        .form-group {
            margin: 20px 0;
            display: flex;
            flex-direction: column;
        }

        input[type="date"], select {
            background-color: transparent;
            color: var(--elegant-gold);
            border: 1px solid var(--elegant-gold);
            padding: 12px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1em;
            border-radius: 4px;
            outline: none;
        }

        .btn-submit {
            background-color: var(--elegant-gold);
            color: var(--dark-forest-green);
            border: none;
            padding: 18px;
            width: 100%;
            font-size: 1.3em;
            font-weight: bold;
            font-family: 'Cormorant Garamond', serif;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 20px;
        }

        .whatsapp-float {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #25D366;
            color: white;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 30px;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <img src="logo.jpg" alt="Logo Mono's" class="logo-img">
        </div>

        <div class="info-header">
            <div class="subtitle">Luce limpio, fino, mono...</div>
            <div class="address">Maceo 254 e/ Cables y Ángel Guerra
            Holguin, Cuba</div>
        </div>

        <form id="bookingForm">
            <h3 class="section-title">Servicios</h3>
            <div class="service-list">
                <label class="service-item">
                    <div><input type="checkbox" name="service" value="Corte sencillo" data-price="200"> Corte sencillo</div>
                    <span>$200</span>
                </label>
                <label class="service-item">
                    <div><input type="checkbox" name="service" value="Degradado" data-price="400"> Degradado</div>
                    <span>$400</span>
                </label>
                <label class="service-item">
                    <div><input type="checkbox" name="service" value="Barba" data-price="100"> Barba</div>
                    <span>$100</span>
                </label>
                <label class="service-item">
                    <div><input type="checkbox" name="service" value="Diseño" data-price="100"> Diseño</div>
                    <span>$100</span>
                </label>
                <label class="service-item">
                    <div><input type="checkbox" name="service" value="Peinado" data-price="200"> Peinado</div>
                    <span>$200</span>
                </label>
            </div>

            <h3 class="section-title">Cita</h3>
            <div class="form-group">
                <label>Fecha:</label>
                <input type="date" id="date" required>
            </div>

            <div class="form-group">
                <label>Hora:</label>
                <select id="time" required disabled>
                    <option value="">Selecciona fecha...</option>
                </select>
            </div>

            <button type="button" class="btn-submit" onclick="sendToWhatsApp()">Reservar por WhatsApp</button>
        </form>
    </div>

    <a href="https://wa.me/5358592776" class="whatsapp-float" target="_blank">💬</a>

    <script>
        const dateInput = document.getElementById('date');
        const timeSelect = document.getElementById('time');
        const checkboxes = document.querySelectorAll('input[name="service"]');

        dateInput.setAttribute('min', new Date().toISOString().split('T')[0]);

        function updateAvailableTimes() {
            if (!dateInput.value) return;

            const selectedDate = new Date(dateInput.value + 'T00:00:00');
            timeSelect.innerHTML = '';

            if (selectedDate.getDay() === 0) {
                timeSelect.innerHTML = '<option value="">Cerrado Domingos</option>';
                timeSelect.disabled = true;
                return;
            }

            let selectedCount = 0;
            checkboxes.forEach(cb => { if (cb.checked) selectedCount++; });

            timeSelect.disabled = false;
            
            // Lista original de horarios
            const allSlots = ["09:00 AM", "09:30 AM", "10:00 AM", "10:30 AM", "11:00 AM", "11:30 AM", "12:00 PM", "02:00 PM", "02:30 PM", "03:00 PM", "03:30 PM", "04:00 PM","04:30 PM","05:00 PM"];
            
            timeSelect.innerHTML = '<option value="">Elegir hora...</option>';
            
            allSlots.forEach(slot => {
                // Si elige más de 1 servicio, bloqueamos el último horario de la mañana (12:00 PM)
                if (selectedCount > 1 && slot === "12:00 PM") {
                    return; 
                }
                const opt = document.createElement('option');
                opt.value = slot; opt.textContent = slot;
                timeSelect.appendChild(opt);
            });
        }

        // Escuchar cambios tanto en fecha como en los servicios seleccionados
        dateInput.addEventListener('change', updateAvailableTimes);
        checkboxes.forEach(cb => cb.addEventListener('change', updateAvailableTimes));

        function sendToWhatsApp() {
            const date = dateInput.value;
            const time = timeSelect.value;
            let selected = [];
            let total = 0;

            checkboxes.forEach(cb => {
                if (cb.checked) {
                    selected.push(cb.value);
                    total += parseInt(cb.getAttribute('data-price'));
                }
            });

            if (selected.length === 0 || !date || !time) {
                alert("Completa todos los datos");
                return;
            }

            const duracionEstimada = selected.length > 1 ? "1 hora aproximadamente" : "30 minutos";

            const msg = `¡Hola Félix!%0A%0AQuiero una cita en *Mono's Barbería*%0A%0A📍Maceo 254 e/Cables y Angel%0A Guerra%0A📅 Fecha: ${date}%0A⏰ Hora: ${time}%0A⏳ Duración: ${duracionEstimada}%0A✂️ Servicios: ${selected.join(', ')}%0A💰 Total a pagar: $${total}`;
            window.open(`https://wa.me/5358592776?text=${msg}`, '_blank');
        }
    </script>
</body>
    </html>
