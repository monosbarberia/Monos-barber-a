<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Turnos | Mono's Barbería</title>
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --dark-forest-green: #1c3823;
            --elegant-gold: #cbb26a;
            --elegant-gold-hover: #e0cca0;
            --soft-gold-bg: rgba(203, 178, 106, 0.05);
            --danger: #c0524a;
            --danger-hover: #d96a61;
        }

        html { scroll-behavior: smooth; }

        body {
            background-color: var(--dark-forest-green);
            color: var(--elegant-gold);
            font-family: 'Cormorant Garamond', serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pin-screen {
            text-align: center;
            padding: 40px;
            max-width: 360px;
        }
        .pin-screen h1 {
            font-size: 1.8em;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }
        .pin-input {
            width: 100%;
            background-color: rgba(0,0,0,0.25);
            color: var(--elegant-gold);
            border: 1px solid rgba(203, 178, 106, 0.5);
            padding: 18px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6em;
            text-align: center;
            letter-spacing: 8px;
            border-radius: 6px;
            outline: none;
            box-sizing: border-box;
        }
        .pin-input:focus { border-color: var(--elegant-gold); }
        .pin-btn {
            margin-top: 20px;
            width: 100%;
            background-color: var(--elegant-gold);
            color: var(--dark-forest-green);
            border: none;
            padding: 16px;
            font-size: 1.2em;
            font-weight: bold;
            font-family: 'Cormorant Garamond', serif;
            cursor: pointer;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .pin-btn:hover { background-color: var(--elegant-gold-hover); }
        .pin-error {
            color: var(--danger);
            margin-top: 15px;
            font-size: 1.05em;
            display: none;
        }

        .panel {
            display: none;
            width: 100%;
            max-width: 480px;
            padding: 30px 20px;
            box-sizing: border-box;
        }
        .panel-title {
            font-size: 1.9em;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .panel-subtitle {
            text-align: center;
            opacity: 0.7;
            font-style: italic;
            margin-bottom: 30px;
        }

        .content-box {
            background-color: var(--soft-gold-bg);
            border: 1px solid rgba(203, 178, 106, 0.2);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        .form-group { margin-bottom: 25px; display: flex; flex-direction: column; gap: 10px; }
        label.field-label {
            font-size: 0.95em;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.75;
        }
        .date-input-wrapper {
            position: relative;
            width: 100%;
        }
        input[type="date"] {
            background-color: rgba(0,0,0,0.25);
            color: var(--elegant-gold);
            border: 1px solid rgba(203, 178, 106, 0.5);
            padding: 16px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2em;
            text-align: center;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
            -webkit-appearance: none;
            appearance: none;
        }
        input[type="date"]::-webkit-calendar-picker-indicator {
            opacity: 0;
            position: absolute;
            right: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        .date-input-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            font-size: 1.1em;
            opacity: 0.7;
        }

        .slot-divider {
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.55;
            margin: 18px 0 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(203, 178, 106, 0.2);
        }
        .slot-divider:first-child { margin-top: 0; }
        .slot-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background-color: rgba(0,0,0,0.15);
            border: 1px solid rgba(203, 178, 106, 0.3);
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 1.05em;
        }
        .slot-status {
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 5px 12px;
            border-radius: 4px;
            font-weight: bold;
        }
        .status-libre {
            background: rgba(120, 200, 130, 0.15);
            color: #8fd49a;
        }
        .status-ocupado {
            background: rgba(192, 82, 74, 0.2);
            color: #e08a83;
        }
        .slot-actions button {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.95em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 9px 16px;
            border-radius: 5px;
            cursor: pointer;
            border: none;
            margin-left: 8px;
        }
        .btn-ocupar {
            background-color: var(--elegant-gold);
            color: var(--dark-forest-green);
        }
        .btn-ocupar:hover { background-color: var(--elegant-gold-hover); }
        .btn-liberar {
            background-color: var(--danger);
            color: white;
        }
        .btn-liberar:hover { background-color: var(--danger-hover); }

        .loading-text {
            text-align: center;
            opacity: 0.7;
            font-style: italic;
            padding: 20px 0;
        }

        .logout-btn {
            display: block;
            margin: 25px auto 0;
            background: transparent;
            border: 1px solid rgba(203, 178, 106, 0.4);
            color: var(--elegant-gold);
            padding: 10px 20px;
            border-radius: 5px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.95em;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
        }
        .logout-btn:hover { background: rgba(203, 178, 106, 0.1); }

        @media (max-width: 480px) {
            .slot-row { flex-direction: column; align-items: flex-start; gap: 10px; }
            .slot-actions { width: 100%; display: flex; gap: 8px; }
            .slot-actions button { flex: 1; margin-left: 0; }
        }
    </style>
</head>
<body>

    <div class="pin-screen" id="pinScreen">
        <h1>Panel de Turnos</h1>
        <input type="password" inputmode="numeric" maxlength="6" class="pin-input" id="pinInput" placeholder="••••" autocomplete="off">
        <button class="pin-btn" onclick="checkPin()">Entrar</button>
        <div class="pin-error" id="pinError">PIN incorrecto, intenta de nuevo</div>
    </div>

    <div class="panel" id="panel">
        <div class="panel-title">Gestión de Turnos</div>
        <div class="panel-subtitle">Mono's Barbería Holguín</div>

        <div class="content-box">
            <div class="form-group">
                <label class="field-label">Selecciona una fecha</label>
                <input type="date" id="adminDate">
            </div>

            <div id="slotsContainer">
                <div class="loading-text">Elige una fecha para ver los turnos</div>
            </div>
        </div>

        <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
    </div>

    <!-- SUPABASE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script>
        const SUPABASE_URL = "https://ldxxflhwpyzldisydhmd.supabase.co";
        const SUPABASE_KEY = "sb_publishable_zYVUWmP8r6s21WegS23RxQ_G-MOf1TH";

        window.supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        window.firebaseReady = true;
    </script>

    <script>
        const CORRECT_PIN = "2802";
        // Genera la lista de horarios: 9:00 a 11:30 y 2:00 a 4:00 PM, cada 30 min
        function buildAllSlots() {
            const slots = [];
            const ranges = [
                { startH: 9, startM: 0, endH: 11, endM: 30 },
                { startH: 14, startM: 0, endH: 16, endM: 0 }
            ];
            ranges.forEach(r => {
                let h = r.startH, m = r.startM;
                while (h < r.endH || (h === r.endH && m <= r.endM)) {
                    slots.push(formatTime12h(h, m));
                    m += 30;
                    if (m >= 60) { m -= 60; h += 1; }
                }
            });
            return slots;
        }

        function formatTime12h(h, m) {
            const period = h >= 12 ? 'PM' : 'AM';
            let h12 = h % 12;
            if (h12 === 0) h12 = 12;
            const mm = String(m).padStart(2, '0');
            return `${h12}:${mm} ${period}`;
        }

        const ALL_SLOTS = buildAllSlots();

        const pinScreen = document.getElementById('pinScreen');
        const panel = document.getElementById('panel');
        const pinInput = document.getElementById('pinInput');
        const pinError = document.getElementById('pinError');
        const adminDate = document.getElementById('adminDate');
        const slotsContainer = document.getElementById('slotsContainer');

        function checkPin() {
            if (pinInput.value === CORRECT_PIN) {
                sessionStorage.setItem('monos_admin_auth', 'ok');
                showPanel();
            } else {
                pinError.style.display = 'block';
                pinInput.value = '';
            }
        }

        pinInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') checkPin();
        });

        function showPanel() {
            pinScreen.style.display = 'none';
            panel.style.display = 'block';
        }

        function logout() {
            sessionStorage.removeItem('monos_admin_auth');
            panel.style.display = 'none';
            pinScreen.style.display = 'block';
            pinInput.value = '';
        }

        if (sessionStorage.getItem('monos_admin_auth') === 'ok') {
            showPanel();
        }

        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        adminDate.setAttribute('min', `${yyyy}-${mm}-${dd}`);

        adminDate.addEventListener('change', loadSlots);

        async function loadSlots() {
            if (!adminDate.value) {
                slotsContainer.innerHTML = '<div class="loading-text">Elige una fecha para ver los turnos</div>';
                return;
            }

            slotsContainer.innerHTML = '<div class="loading-text">Cargando...</div>';

            let occupiedDocs = {};
            try {
                const { data, error } = await window.supabaseClient
                    .from('turnos')
                    .select('id, turno')
                    .eq('fecha', adminDate.value);

                if (error) throw error;

                data.forEach(row => {
                    occupiedDocs[row.turno] = row.id;
                });
            } catch (err) {
                slotsContainer.innerHTML = '<div class="loading-text">Error al cargar. Revisa tu conexion.</div>';
                console.error(err);
                return;
            }

            renderSlots(occupiedDocs);
        }

        function renderSlots(occupiedDocs) {
            slotsContainer.innerHTML = '';

            ALL_SLOTS.forEach((slot, index) => {
                if (slot === '2:00 PM') {
                    const divider = document.createElement('div');
                    divider.className = 'slot-divider';
                    divider.textContent = 'Tarde';
                    slotsContainer.appendChild(divider);
                } else if (index === 0) {
                    const divider = document.createElement('div');
                    divider.className = 'slot-divider';
                    divider.textContent = 'Mañana';
                    slotsContainer.appendChild(divider);
                }

                const isOccupied = occupiedDocs.hasOwnProperty(slot);
                const row = document.createElement('div');
                row.className = 'slot-row';

                row.innerHTML = `
                    <span>${slot}</span>
                    <span class="slot-status ${isOccupied ? 'status-ocupado' : 'status-libre'}">
                        ${isOccupied ? 'Ocupado' : 'Libre'}
                    </span>
                    <span class="slot-actions"></span>
                `;

                const actionsSpan = row.querySelector('.slot-actions');
                const btn = document.createElement('button');

                if (isOccupied) {
                    btn.textContent = 'Liberar';
                    btn.className = 'btn-liberar';
                    btn.onclick = () => liberarTurno(occupiedDocs[slot]);
                } else {
                    btn.textContent = 'Ocupar';
                    btn.className = 'btn-ocupar';
                    btn.onclick = () => ocuparTurno(slot);
                }

                actionsSpan.appendChild(btn);
                slotsContainer.appendChild(row);
            });
        }

        async function ocuparTurno(slot) {
            try {
                const { error } = await window.supabaseClient
                    .from('turnos')
                    .insert({ fecha: adminDate.value, turno: slot, estado: 'ocupado' });

                if (error) throw error;
                loadSlots();
            } catch (err) {
                alert('No se pudo marcar el turno como ocupado. Revisa tu conexion.');
                console.error(err);
            }
        }

        async function liberarTurno(rowId) {
            try {
                const { error } = await window.supabaseClient
                    .from('turnos')
                    .delete()
                    .eq('id', rowId);

                if (error) throw error;
                loadSlots();
            } catch (err) {
                alert('No se pudo liberar el turno. Revisa tu conexion.');
                console.error(err);
            }
        }

        // ============================================
        // SONIDO DE CLIC en cada toque de pantalla
        // ============================================
        let clickAudioCtx = null;

        function playClickSound() {
            try {
                if (!clickAudioCtx) {
                    clickAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (clickAudioCtx.state === 'suspended') {
                    clickAudioCtx.resume();
                }

                const osc = clickAudioCtx.createOscillator();
                const gain = clickAudioCtx.createGain();

                osc.type = 'square';
                osc.frequency.setValueAtTime(1000, clickAudioCtx.currentTime);

                gain.gain.setValueAtTime(0.08, clickAudioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, clickAudioCtx.currentTime + 0.04);

                osc.connect(gain);
                gain.connect(clickAudioCtx.destination);

                osc.start(clickAudioCtx.currentTime);
                osc.stop(clickAudioCtx.currentTime + 0.04);
            } catch (e) {
                // Si el navegador bloquea audio, simplemente no sonara
            }
        }

        document.addEventListener('pointerdown', playClickSound);
    </script>
</body>
</html>
